# Full HTTPS config when certbot install fails
# Copy to /etc/nginx/sites-available/sgq-app-landing

server {
    listen 80;
    listen [::]:80;
    server_name app.sagp-qp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.sagp-qp.com;

    ssl_certificate /etc/letsencrypt/live/app.sagp-qp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.sagp-qp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/sgq-app-landing;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
}
