# Full HTTPS config when certbot install fails
# Copy to /etc/nginx/sites-available/sgq-teacher-export

server {
    listen 80;
    listen [::]:80;
    server_name export.sagp-qp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name export.sagp-qp.com;

    ssl_certificate /etc/letsencrypt/live/export.sagp-qp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/export.sagp-qp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/sgq-teacher-export;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /app.js {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
}
