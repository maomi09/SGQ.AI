# /etc/nginx/sites-available/sgq-teacher-export
# HTTP — certbot may add HTTPS server block, or use nginx-export-https.conf

server {
    listen 80;
    listen [::]:80;
    server_name export.sagp-qp.com;

    root /var/www/sgq-teacher-export;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
}
